<div class="container mt-5 text-light">

    <div class="card bg-dark border-success shadow-lg">

        <div class="card-body">

            <h2 class="text-center text-success mb-4">
                Registro Gamer
            </h2>

            <form #formContacto="ngForm" (ngSubmit)="enviar(formContacto)">

                <!-- Nick -->
                <div class="mb-3">

                    <label class="form-label text-success">
                        Nick Gamer
                    </label>

                    <input
                        type="text"
                        class="form-control bg-black text-light border-success"
                        name="nombre"
                        [(ngModel)]="nombre"
                        required
                        minlength="3"
                        #nombreRef="ngModel"
                        [class.is-invalid]="nombreRef.invalid && nombreRef.touched">

                    <div *ngIf="nombreRef.invalid && nombreRef.touched" class="text-danger mt-1">

                        <small *ngIf="nombreRef.errors?.['required']">
                            El nick es obligatorio
                        </small>

                        <small *ngIf="nombreRef.errors?.['minlength']">
                            Mínimo 3 caracteres
                        </small>

                    </div>

                </div>

                <!-- Juego -->
                <div class="mb-3">

                    <label class="form-label text-success">
                        Juego
                    </label>

                    <input
                        type="text"
                        class="form-control bg-black text-light border-success"
                        name="email"
                        [(ngModel)]="email"
                        required
                        minlength="3"
                        #emailRef="ngModel"
                        [class.is-invalid]="emailRef.invalid && emailRef.touched">

                    <div *ngIf="emailRef.invalid && emailRef.touched" class="text-danger mt-1">

                        <small *ngIf="emailRef.errors?.['required']">
                            El juego es obligatorio
                        </small>

                    </div>

                </div>

                <!-- Nivel -->
                <div class="mb-3">

                    <label class="form-label text-success">
                        Nivel
                    </label>

                    <textarea
                        class="form-control bg-black text-light border-success"
                        name="mensaje"
                        [(ngModel)]="mensaje"
                        required
                        minlength="1"
                        #mensajeRef="ngModel"
                        [class.is-invalid]="mensajeRef.invalid && mensajeRef.touched">
                    </textarea>

                    <div *ngIf="mensajeRef.invalid && mensajeRef.touched" class="text-danger mt-1">

                        <small *ngIf="mensajeRef.errors?.['required']">
                            El nivel es obligatorio
                        </small>

                    </div>

                </div>

                <!-- Botón -->
                <button
                    class="btn btn-success w-100"
                    type="submit"
                    [disabled]="formContacto.invalid">

                    Registrar Jugador

                </button>

            </form>

        </div>

    </div>

    <!-- TABLA JUGADORES -->

    <div class="mt-5">

        <h3 class="text-success">
            Lista de Jugadores
        </h3>

        <table class="table table-dark table-bordered table-hover mt-3">

            <thead>

                <tr>

                    <th>Nick</th>
                    <th>Juego</th>
                    <th>Nivel</th>

                </tr>

            </thead>

            <tbody>

                <tr *ngFor="let jugador of jugadores">

                    <td>{{ jugador.nick }}</td>
                    <td>{{ jugador.juego }}</td>
                    <td>{{ jugador.nivel }}</td>

                </tr>

            </tbody>

        </table>

    </div>

</div>
